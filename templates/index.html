<!DOCTYPE html>
<html>
<head>
<title>DevOps Task Manager</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<h1 class="text-center mb-4">🚀 DevOps Task Manager</h1>

<div class="card p-3 shadow">

<form method="POST" class="d-flex gap-2">
<input type="text" name="task" class="form-control" placeholder="Enter DevOps task..." required>
<button class="btn btn-primary">Add Task</button>
</form>

</div>

<div class="mt-4">

<table class="table table-striped table-hover">

<thead class="table-dark">
<tr>
<th>Task</th>
<th>Status</th>
<th>Created</th>
<th>Actions</th>
</tr>
</thead>

<tbody>

{% for task in tasks %}

<tr>

<td>{{ task.name }}</td>

<td>

{% if task.status == "Completed" %}
<span class="badge bg-success">Completed</span>
{% else %}
<span class="badge bg-warning">Pending</span>
{% endif %}

</td>

<td>{{ task.created }}</td>

<td>

<a href="/complete/{{ loop.index0 }}" class="btn btn-success btn-sm">Complete</a>

<a href="/delete/{{ loop.index0 }}" class="btn btn-danger btn-sm">Delete</a>

</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</div>

</body>
</html>
