<!DOCTYPE html>
<html>
<head>
    <title>DevOps Task Manager</title>
</head>
<body>

<h1>DevOps Task Manager</h1>

<form method="POST">
    <input type="text" name="task" placeholder="Enter task" required>
    <button type="submit">Add Task</button>
</form>

<ul>
{% for task in tasks %}
    <li>
        {{ task }}
        <a href="/delete/{{ loop.index0 }}">Delete</a>
    </li>
{% endfor %}
</ul>

</body>
</html>
